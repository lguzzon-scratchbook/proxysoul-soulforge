name: Publish Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  bundles:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            platform: darwin
          - os: macos-latest
            arch: x64
            platform: darwin
          - os: ubuntu-latest
            arch: x64
            platform: linux
          - os: ubuntu-latest
            arch: x64-baseline
            platform: linux
          - os: ubuntu-latest
            arch: arm64
            platform: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install --frozen-lockfile

      - name: Install target platform native deps
        run: |
          # x64-baseline uses the same native deps as x64
          NATIVE_ARCH="${{ matrix.arch }}"
          [[ "$NATIVE_ARCH" == "x64-baseline" ]] && NATIVE_ARCH="x64"
          PKG="@opentui/core-${{ matrix.platform }}-${NATIVE_ARCH}"
          OTUI_VER=$(bun -e "console.log(require('@opentui/core/package.json').version)")
          TARGET_DIR="node_modules/@opentui/core-${{ matrix.platform }}-${NATIVE_ARCH}"
          if [ ! -d "$TARGET_DIR" ]; then
            mkdir -p "$TARGET_DIR"
            TARBALL=$(npm pack "${PKG}@${OTUI_VER}" 2>/dev/null | tail -1)
            tar xzf "$TARBALL" --strip-components=1 -C "$TARGET_DIR"
            rm -f "$TARBALL"
          fi

      - name: Build bundle
        run: bash scripts/bundle.sh ${{ matrix.arch }} ${{ matrix.platform }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload to release
        run: |
          VERSION=$(bun -e "console.log(require('./package.json').version)")
          BUNDLE="soulforge-${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}"
          for i in 1 2 3; do
            gh release upload "${{ github.event.release.tag_name }}" "dist/bundle/${BUNDLE}.tar.gz" --clobber && break
            echo "Upload attempt $i failed, retrying in 10s..."
            sleep 10
          done
        env:
          GH_TOKEN: ${{ github.token }}

  checksums:
    runs-on: ubuntu-latest
    needs: bundles
    steps:
      - uses: actions/checkout@v6

      - name: Download all release assets
        run: |
          gh release download "${{ github.event.release.tag_name }}" --dir assets --pattern '*.tar.gz'
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate SHA256SUMS
        run: |
          cd assets
          sha256sum *.tar.gz | tee SHA256SUMS.txt

      - name: Upload checksums to release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" assets/SHA256SUMS.txt --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  update-homebrew:
    runs-on: ubuntu-latest
    needs: checksums
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        run: |
          gh release download "${{ github.event.release.tag_name }}" --dir assets --pattern 'SHA256SUMS.txt'
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract SHA256 per platform
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-x64-baseline linux-arm64; do
            SHA=$(grep "soulforge-${VERSION}-${platform}.tar.gz" assets/SHA256SUMS.txt | awk '{print $1}')
            KEY=$(echo "$platform" | tr '-' '_')
            echo "${KEY}=${SHA}" >> "$GITHUB_OUTPUT"
            echo "  ${platform}: ${SHA}"
          done

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: ProxySoul/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Generate formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA_DARWIN_ARM64: ${{ steps.sha.outputs.darwin_arm64 }}
          SHA_DARWIN_X64: ${{ steps.sha.outputs.darwin_x64 }}
          SHA_LINUX_X64: ${{ steps.sha.outputs.linux_x64 }}
          SHA_LINUX_X64_BASELINE: ${{ steps.sha.outputs.linux_x64_baseline }}
          SHA_LINUX_ARM64: ${{ steps.sha.outputs.linux_arm64 }}
        run: |
          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/soulforge.rb << FORMULA
          # typed: false
          # frozen_string_literal: true

          class Soulforge < Formula
            desc "Graph-powered code intelligence"
            homepage "https://github.com/ProxySoul/soulforge"
            version "${VERSION}"
            license "BUSL-1.1"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/ProxySoul/soulforge/releases/download/v#{version}/soulforge-#{version}-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              if Hardware::CPU.intel?
                url "https://github.com/ProxySoul/soulforge/releases/download/v#{version}/soulforge-#{version}-darwin-x64.tar.gz"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/ProxySoul/soulforge/releases/download/v#{version}/soulforge-#{version}-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
              if Hardware::CPU.intel?
                # AVX detection: pre-Sandy Bridge CPUs need the baseline (SSE2-only) build.
                if Hardware::CPU.flags.include?("avx")
                  url "https://github.com/ProxySoul/soulforge/releases/download/v#{version}/soulforge-#{version}-linux-x64.tar.gz"
                  sha256 "${SHA_LINUX_X64}"
                else
                  url "https://github.com/ProxySoul/soulforge/releases/download/v#{version}/soulforge-#{version}-linux-x64-baseline.tar.gz"
                  sha256 "${SHA_LINUX_X64_BASELINE}"
                end
              end
            end

            def install
              libexec.install Dir["*"]

              # Gzip ALL Mach-O files so Homebrew's keg_relocate can't detect them.
              # It scans by magic bytes, not extension — renaming alone doesn't work.
              system "gzip", libexec/"soulforge"
              Dir.glob(libexec/"deps/native/**/*.{node,dylib,so}").each do |f|
                system "gzip", f
              end

              # First-run wrapper: macOS App Management blocks Homebrew's
              # post_install from writing to ~/.soulforge/. The wrapper runs
              # install.sh on first invocation when the USER runs Terminal
              # (which has full permissions).
              (bin/"soulforge").write <<~SH
                #!/bin/bash
                set -euo pipefail
                CELLAR="#{libexec}"
                SF="\$HOME/.soulforge/bin/soulforge"

                # post_install may have failed — decompress if still gzipped
                if [ -f "\$CELLAR/soulforge.gz" ] && [ ! -f "\$CELLAR/soulforge" ]; then
                  gunzip "\$CELLAR/soulforge.gz" 2>/dev/null || true
                  find "\$CELLAR/deps/native" -name "*.gz" -exec gunzip {} + 2>/dev/null || true
                  chmod +x "\$CELLAR/soulforge" 2>/dev/null || true
                fi

                # Verify cellar binary exists
                if [ ! -x "\$CELLAR/soulforge" ]; then
                  echo "Error: SoulForge binary not found at \$CELLAR/soulforge" >&2
                  echo "Try: brew reinstall soulforge" >&2
                  exit 1
                fi

                # Run install.sh if missing or outdated
                if [ ! -x "\$SF" ] || [ "\$CELLAR/soulforge" -nt "\$SF" ]; then
                  echo "Setting up SoulForge..." >&2
                  if ! bash "\$CELLAR/install.sh" --quiet; then
                    echo "" >&2
                    echo "Install failed. Run manually:" >&2
                    echo "  bash \$CELLAR/install.sh" >&2
                    exit 1
                  fi
                fi

                exec "\$SF" "\$@"
              SH
              (bin/"sf").write <<~SH
                #!/bin/bash
                exec "\$(dirname "\$0")/soulforge" "\$@"
              SH
              chmod 0755, bin/"soulforge"
              chmod 0755, bin/"sf"
            end

            def post_install
              # Decompress — if this fails, the wrapper handles it on first run
              system "gunzip", libexec/"soulforge.gz" if File.exist?(libexec/"soulforge.gz")
              Dir.glob(libexec/"deps/native/**/*.gz").each { |f| system "gunzip", f }
              system "chmod", "+x", libexec/"soulforge"
            end

            def caveats
              <<~EOS
                SoulForge installed to ~/.soulforge/
                Run 'soulforge' or 'sf' to start.
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/soulforge --version")
            end
          end
          FORMULA

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/soulforge.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "soulforge ${{ steps.version.outputs.version }}"
          git push

  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@latest

      - run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Publish to npm
        run: npm publish || echo "Version already published, skipping"
